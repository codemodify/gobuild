<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>gobuild</title>
	<link rel="stylesheet" type="text/css" href="asciinema-player.css" />
	<style>
		*, *::before, *::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			background: #0d1117;
			color: #e6edf3;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.hero {
			width: 100%;
			max-width: 1100px;
			padding: 60px 40px;
		}

		.asides {
			display: flex;
			gap: 60px;
			justify-content: space-between;
			align-items: center;
		}

		.hero-text {
			flex: 1;
			min-width: 0;
		}

		.hero-text h1 {
			font-size: 3rem;
			font-weight: 700;
			line-height: 1.15;
			margin-bottom: 1rem;
			background: linear-gradient(135deg, #e6edf3 0%, #7d8fa3 100%);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}

		.hero-text p {
			font-size: 1.15rem;
			color: #8b949e;
			line-height: 1.7;
			margin-bottom: 2rem;
		}

		.action-buttons {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
		}

		.btn {
			display: inline-block;
			padding: 10px 24px;
			border-radius: 6px;
			font-size: 0.95rem;
			font-weight: 600;
			text-decoration: none;
			transition: opacity 0.15s;
		}

		.btn:hover {
			opacity: 0.85;
		}

		.btn-primary {
			background: #238636;
			color: #fff;
		}

		.btn-secondary {
			background: #21262d;
			color: #e6edf3;
			border: 1px solid #30363d;
		}

		/* ── Demo panel ── */
		.display {
			flex: 1;
			min-width: 0;
			perspective: 1500px;
		}

		.display > .caption {
			transform: rotateY(-25deg);
		}

		.caption {
			display: block;
		}

		#demo {
			display: block;
			margin-bottom: 0.75em;
		}

		/* Asciinema player overrides */
		.ap-wrapper .ap-player {
			box-shadow: 10px 10px 15px rgba(0, 0, 0, 0.45);
			border-radius: 10px;
			overflow: hidden;
			background:
				rgb(0 0 0 / 0.7)
				linear-gradient(
					135deg,
					transparent 0%,
					rgb(200 200 200 / 0.25) 46%,
					rgb(200 200 200 / 0.15) 46.5%,
					transparent 100%
				);
		}

		.ap-player pre.ap-terminal {
			border-color: transparent !important;
			background-color: transparent !important;
		}

		.caption-text {
			font-size: 0.85rem;
			color: #6e7681;
			text-align: center;
		}

		/* ── Responsive ── */
		@media (max-width: 768px) {
			.asides {
				flex-direction: column;
			}

			.display > .caption {
				transform: none;
			}

			.hero-text h1 {
				font-size: 2rem;
			}
		}
	</style>
</head>

<body>
	<section class="hero">
		<div class="asides">
			<div class="hero-text">
				<h1>Build Go binaries,<br>the simple way.</h1>
				<p>
					<code style="font-family:monospace;color:#58a6ff;">gobuild</code> cross-compiles your Go project
					for every platform in one command &mdash; no Docker, no fuss.
				</p>
				<div class="action-buttons">
					<a class="btn btn-primary" href="https://github.com/codemodify/gobuild">Get started</a>
					<a class="btn btn-secondary" href="https://github.com/codemodify/gobuild#readme">Documentation</a>
				</div>
			</div>

			<div class="display">
				<div class="caption">
					<div id="demo"></div>
					<p class="caption-text">Watch gobuild cross-compile a project in seconds.</p>
				</div>
			</div>
		</div>
	</section>

	<script src="asciinema-player.min.js"></script>
	<script>
		AsciinemaPlayer.create('demo.cast', document.getElementById('demo'), {
			preload: true,
			autoPlay: true,
			controls: true
		});
	</script>
</body>

</html>
